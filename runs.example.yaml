# Copy this file to runs.yaml, then replace the sample values with your own.
# Relative file paths and output directories resolve from this config file.

runs:
  # Minimal local file example.
  - name: team-notes
    type: local_files
    file_path: ./example-inputs/team-notes.txt
    output_dir: ./artifacts/local/team-notes

  # Minimal git_repo example. Use include filters by default; ingesting an
  # entire repository is usually not the safest starting point.
  - name: example-repo
    type: git_repo
    repo_url: https://github.com/ctrl-alt-keith/ai-workflow-playbook.git
    output_dir: ./artifacts/git/example-repo
    include:
      - "docs/**/*.md"
      - "README.md"

  # Minimal Confluence example using the default stub client.
  - name: docs-home
    type: confluence
    base_url: https://example.atlassian.net/wiki
    target: "12345"
    output_dir: ./artifacts/confluence/docs-home
    # Real mode with bearer auth from CONFLUENCE_BEARER_TOKEN.
    # client_mode: real
    # auth_method: bearer-env
    # fetch_cache_dir: ./.cache/knowledge-adapters
    # force_refresh: true
    # clear_cache: true
    # dry_run: true
    # Optional TLS override for an internal CA.
    # ca_bundle: ./certs/internal-ca.pem

  # Tree mode example with optional real-mode mTLS settings.
  - name: eng-space-tree
    type: confluence
    base_url: https://example.atlassian.net/wiki
    target: "67890"
    output_dir: ./artifacts/confluence/eng-space-tree
    tree: true
    max_depth: 1
    # client_mode: real
    # auth_method: client-cert-env
    # Optional traversal cache for repeated large tree listing runs.
    # tree_cache_dir: ./.cache/confluence-tree
    # force_refresh: true
    # clear_cache: true
    # client_cert_file: ./certs/confluence-client.crt
    # client_key_file: ./certs/confluence-client.key
    # Optional TLS override for an internal CA.
    # ca_bundle: ./certs/internal-ca.pem

  # Optional bundle example. stale_mode is only applied when input manifests
  # include explicit stale-artifact metadata.
  - name: eng-space-tree-bundle
    type: bundle
    inputs:
      - ./artifacts/confluence/eng-space-tree
    output: ./artifacts/bundles/eng-space-tree.md
    stale_mode: flag

# Optional named bundle definitions resolve inputs from existing run names.
# These bundle definitions do not execute the referenced runs automatically.
bundles:
  - name: review-pack
    runs:
      - team-notes
      - eng-space-tree
    output: ./artifacts/bundles/review-pack.md
    header_mode: minimal
